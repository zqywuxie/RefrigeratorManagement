services:
  mysql:
    image: mysql:8.0
    container_name: biofridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-biofridge_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-biofridge}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./server
    container_name: biofridge-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-biofridge_password}
      DB_NAME: ${MYSQL_DATABASE:-biofridge}
      JWT_SECRET: ${JWT_SECRET:-biofridge-secret-key}
      PORT: 3001
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    expose:
      - "3001"

  mysql-backup:
    image: mysql:8.0
    container_name: biofridge-mysql-backup
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/scripts/mysql-backup.sh"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-biofridge_password}
      DB_NAME: ${MYSQL_DATABASE:-biofridge}
      BACKUP_DIR: /backups
      BACKUP_AT_HOUR: ${BACKUP_AT_HOUR:-3}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      RUN_ON_START: ${BACKUP_RUN_ON_START:-true}
      TZ: Asia/Shanghai
    volumes:
      - ./scripts/mysql-backup.sh:/scripts/mysql-backup.sh:ro
      - ./backups/mysql:/backups
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
    container_name: biofridge-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mysql_data:
