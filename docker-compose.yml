services:
  mysql:
    image: mysql:8.0
    container_name: biofridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-biofridge_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-biofridge}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./server
    container_name: biofridge-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-biofridge_password}
      DB_NAME: ${MYSQL_DATABASE:-biofridge}
      JWT_SECRET: ${JWT_SECRET:-biofridge-secret-key}
      PORT: 3001
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3001"

  frontend:
    build:
      context: .
    container_name: biofridge-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
